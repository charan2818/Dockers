services:
  catalogue:
    build: ./catalogue
    image: charan1325/catalogue:1.0.0
    container_name: catalogue

  user:
    build: ./user
    image: charan1325/user:1.0.0
    container_name: user
    depends_on:
    - redis

  frontend:
    build: ./frontend
    image: charan1325/frontend:1.0.0
    container_name: frontend
    depends_on:
    - catalogue
    - user

  mongodb:
    build: ./mongodb # it moves to mongodb directory 
    image: charan1325/mongodb:1.0.0 #docker build -t charan1325mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis  


networks:
  default:
    driver: bridge
    name: roboshop
    external: false #if false ypu need to create network manually

    